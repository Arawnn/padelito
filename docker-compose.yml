name: padelito-backend

x-laravel-env: &laravel-env
  APP_NAME: ${APP_NAME:-Padelito}
  APP_ENV: ${APP_ENV:-local}
  APP_KEY: ${APP_KEY:-}
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_URL: ${APP_URL:-http://localhost:8001}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_STACK: ${LOG_STACK:-stderr}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DB_CONNECTION: ${DB_CONNECTION:-pgsql}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:-padelito}
  DB_USERNAME: ${DB_USERNAME:-padelito}
  DB_PASSWORD: ${DB_PASSWORD:-change-me-local}
  DB_SSLMODE: ${DB_SSLMODE:-disable}
  DB_SEARCH_PATH: ${DB_SEARCH_PATH:-public}
  REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
  CACHE_STORE: ${CACHE_STORE:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-mailpit}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_USERNAME: ${MAIL_USERNAME:-null}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@padelito.local}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Padelito}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-s3}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-padelito}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-change-me-local}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  AWS_BUCKET: ${AWS_BUCKET:-padelito}
  AWS_ENDPOINT: ${AWS_ENDPOINT:-http://minio:9000}
  AWS_URL: ${AWS_URL:-http://localhost:9000/padelito}
  AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-true}
  SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-1.0}

x-laravel-service: &laravel-service
  image: padelito-backend:local
  build:
    context: .
    dockerfile: Dockerfile
    args:
      UID: ${DOCKER_UID:-1000}
      GID: ${DOCKER_GID:-1000}
  env_file:
    - path: ./.env.docker
      required: false
  environment: *laravel-env
  volumes:
    - ./:/var/www/html
  networks:
    - backend
    - observability
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  app:
    <<: *laravel-service
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8001}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
      - observability
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    <<: *laravel-service
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--timeout=90", "--sleep=1"]
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  scheduler:
    <<: *laravel-service
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-padelito}
      POSTGRES_USER: ${DB_USERNAME:-padelito}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
      - observability
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-padelito} -d ${DB_DATABASE:-padelito}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
      - observability
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-padelito}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - backend
      - observability
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-create-bucket:
    image: minio/mc:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-padelito}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local}
      AWS_BUCKET: ${AWS_BUCKET:-padelito}
    networks:
      - backend
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$AWS_BUCKET &&
      mc anonymous set download local/$$AWS_BUCKET"
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.4.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability
    depends_on:
      - cadvisor
      - postgres-exporter
      - redis-exporter
      - otel-collector

  grafana:
    image: grafana/grafana:12.0.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:3.5.1
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - observability

  alloy:
    image: grafana/alloy:v1.9.2
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.8.1
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/tmp/tempo
    networks:
      - observability
    depends_on:
      tempo-init:
        condition: service_completed_successfully

  tempo-init:
    image: busybox:1.37
    command: ["sh", "-c", "mkdir -p /tmp/tempo/wal /tmp/tempo/blocks && chown -R 10001:10001 /tmp/tempo"]
    user: "0:0"
    volumes:
      - tempo-data:/tmp/tempo
    networks:
      - observability
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    command: ["--config=/etc/otelcol/collector.yml"]
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    volumes:
      - ./docker/otel/collector.yml:/etc/otelcol/collector.yml:ro
    networks:
      - observability
    depends_on:
      - tempo

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - observability

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USERNAME:-padelito}:${DB_PASSWORD:-change-me-local}@postgres:5432/${DB_DATABASE:-padelito}?sslmode=disable
    networks:
      - backend
      - observability
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.74.0
    environment:
      REDIS_ADDR: redis://redis:6379
    networks:
      - backend
      - observability
    depends_on:
      redis:
        condition: service_healthy

networks:
  backend:
  observability:

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
  loki-data:
  alloy-data:
  tempo-data:
